<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Ai đẹp trai nhất?</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #2a003f, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        button {
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: linear-gradient(90deg, #a100ff, #ff00c8);
            color: white;
            box-shadow: 0 0 20px #a100ff;
            transition: 0.4s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff00c8;
        }

        .hidden {
            display: none;
        }

        img {
            width: 260px;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 0 40px #a100ff;
            animation: fadeIn 1.5s ease forwards;
        }

        h1 {
            margin-top: 25px;
            font-size: 30px;
            background: linear-gradient(90deg, #ff00c8, #a100ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: #ff00c8;
            font-size: 20px;
            animation: float 6s linear infinite;
            opacity: 0.8;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(-110vh) scale(1.5);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <button id="btn">Bấm vào để biết ai đẹp trai nhất 🔥</button>

        <div id="result" class="hidden">
            <img src="PMT.jpg">
            <h1>"Phạm Minh Thuận chứ ai =)))"</h1>
        </div>
    </div>

    <script>
        var btn = document.getElementById("btn");
        var result = document.getElementById("result");

        btn.onclick = function () {
            btn.style.display = "none";
            result.classList.remove("hidden");
            startHearts();
        };

        function startHearts() {
            setInterval(function () {
                var heart = document.createElement("div");
                heart.className = "heart";
                heart.innerHTML = "💜";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (15 + Math.random() * 30) + "px";
                heart.style.animationDuration = (4 + Math.random() * 4) + "s";
                document.body.appendChild(heart);
                setTimeout(function () {
                    heart.remove();
                }, 7000);
            }, 200);
        }
    </script>

</body>

</html>
